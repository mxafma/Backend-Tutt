# Puerto — Railway inyecta PORT automáticamente
server.port=${PORT:8080}

# Base de datos — Railway inyecta las variables PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:verduleria}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:12345}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:bXktc2VjcmV0LWtleS12ZXJkdWxlcmlhLW12cC0yMDI2LXN1cGVyLXNlY3JldA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS — URL del frontend en Vercel (separadas por coma si hay más de una)
cors.allowed.origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173,http://localhost:3000}
