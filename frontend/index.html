<!doctype html>
<html lang="es" data-theme="gestionoc">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GestionOC — TuttiFruty</title>
    <!-- Evita flash al cargar: aplica tema antes de que React renderice -->
    <script>
      (function () {
        var t = localStorage.getItem('gestionoc_theme');
        document.documentElement.setAttribute(
          'data-theme',
          t === 'dark' ? 'gestionoc-dark' : 'gestionoc'
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
